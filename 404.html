<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Humberto Henríquez</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0F2B46;
            color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 480px; }
        h1 { font-size: 5rem; font-weight: 800; opacity: 0.2; margin-bottom: 16px; }
        h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
        p { font-size: 1rem; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 32px; }
        a {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; background: #2D6A9F; color: #FFFFFF;
            border-radius: 8px; text-decoration: none; font-weight: 600;
            font-size: 0.9375rem; transition: all 0.3s ease;
        }
        a:hover { background: #245a87; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page not found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/">Go to homepage</a>
    </div>
</body>
</html>
